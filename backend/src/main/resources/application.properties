server.port=8080
spring.application.name=profact-backend

# ===== H2 Database Configuration =====
# Base de datos persistente en archivo (los datos se conservan entre reinicios)
spring.datasource.url=jdbc:h2:file:./data/profactdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Consola H2 (accesible en http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JWT Configuration =====
# Clave secreta para firmar tokens (en produccion usar variable de entorno)
jwt.secret=ProFactSecretKey2024SuperSeguraParaFirmarTokensJWT256BitsMinimo
# Tiempo de expiracion del token en milisegundos (24 horas = 86400000)
jwt.expiration=86400000
